<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Animes - Jikan API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .search-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .search-form {
            display: flex;
            gap: 10px;
        }

        #searchInput {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #searchInput:focus {
            outline: none;
            border-color: #667eea;
        }

        #searchButton {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #searchButton:hover {
            background: #5568d3;
        }

        #searchButton:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        #loading {
            text-align: center;
            color: white;
            font-size: 18px;
            margin: 20px 0;
            display: none;
        }

        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .anime-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .anime-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.2);
        }

        .anime-card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        .anime-info {
            padding: 15px;
        }

        .anime-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .anime-details {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .anime-score {
            color: #667eea;
            font-weight: bold;
        }

        .anime-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }

        .genre-tag {
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            color: #666;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
        }

        .pagination button {
            padding: 10px 20px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .pagination button:hover:not(:disabled) {
            background: #667eea;
            color: white;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination span {
            color: white;
            font-size: 16px;
        }

        #error {
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎌 Busca de Animes</h1>

        <div class="search-box">
            <form class="search-form" id="searchForm">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Digite o nome do anime (ex: Naruto, One Piece)..."
                    autocomplete="off"
                >
                <button type="submit" id="searchButton">Buscar</button>
            </form>
        </div>

        <div id="error"></div>
        <div id="loading">🔄 Carregando...</div>

        <div id="results"></div>

        <div class="pagination" id="pagination" style="display: none;">
            <button id="prevPage">← Anterior</button>
            <span id="pageInfo"></span>
            <button id="nextPage">Próxima →</button>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://localhost:7279/api/anime';
        let currentPage = 1;
        let currentQuery = '';
        let hasNextPage = false;

        const searchForm = document.getElementById('searchForm');
        const searchInput = document.getElementById('searchInput');
        const searchButton = document.getElementById('searchButton');
        const loadingDiv = document.getElementById('loading');
        const resultsDiv = document.getElementById('results');
        const errorDiv = document.getElementById('error');
        const paginationDiv = document.getElementById('pagination');
        const prevPageBtn = document.getElementById('prevPage');
        const nextPageBtn = document.getElementById('nextPage');
        const pageInfo = document.getElementById('pageInfo');

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            currentPage = 1;
            currentQuery = searchInput.value.trim();
            searchAnime(currentQuery, currentPage);
        });

        prevPageBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                searchAnime(currentQuery, currentPage);
            }
        });

        nextPageBtn.addEventListener('click', () => {
            if (hasNextPage) {
                currentPage++;
                searchAnime(currentQuery, currentPage);
            }
        });

        async function searchAnime(query, page) {
            try {
                showLoading(true);
                hideError();
                resultsDiv.innerHTML = '';

                const url = `${API_BASE_URL}/search?q=${encodeURIComponent(query)}&page=${page}`;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`Erro na requisição: ${response.status}`);
                }

                const data = await response.json();

                displayResults(data.results);
                updatePagination(data);

            } catch (error) {
                showError('Erro ao buscar animes. Verifique se a API está rodando.');
                console.error('Erro:', error);
            } finally {
                showLoading(false);
            }
        }

        function displayResults(animes) {
            if (!animes || animes.length === 0) {
                resultsDiv.innerHTML = '<p style="color: white; text-align: center; grid-column: 1/-1;">Nenhum anime encontrado.</p>';
                return;
            }

            resultsDiv.innerHTML = animes.map(anime => `
                <div class="anime-card" onclick="window.open('${anime.url || '#'}', '_blank')">
                    <img src="${anime.imageUrl || 'https://via.placeholder.com/250x350?text=No+Image'}" 
                         alt="${anime.title}"
                         onerror="this.src='https://via.placeholder.com/250x350?text=No+Image'">
                    <div class="anime-info">
                        <div class="anime-title">${anime.title || 'Título não disponível'}</div>
                        <div class="anime-details">
                            <span>${anime.type || 'N/A'} ${anime.episodes ? `• ${anime.episodes} eps` : ''}</span>
                            <span class="anime-score">⭐ ${anime.score || 'N/A'}</span>
                        </div>
                        <div class="anime-details">
                            <span>${anime.status || 'N/A'}</span>
                            <span>${anime.year || 'N/A'}</span>
                        </div>
                        ${anime.genres && anime.genres.length > 0 ? `
                            <div class="anime-genres">
                                ${anime.genres.slice(0, 3).map(genre => `<span class="genre-tag">${genre}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function updatePagination(data) {
            hasNextPage = data.hasNextPage;
            const totalPages = data.totalPages;

            if (totalPages > 1) {
                paginationDiv.style.display = 'flex';
                pageInfo.textContent = `Página ${currentPage} de ${totalPages}`;
                prevPageBtn.disabled = currentPage === 1;
                nextPageBtn.disabled = !hasNextPage;
            } else {
                paginationDiv.style.display = 'none';
            }
        }

        function showLoading(show) {
            loadingDiv.style.display = show ? 'block' : 'none';
            searchButton.disabled = show;
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            errorDiv.style.display = 'none';
        }

        // Busca inicial com animes populares
        searchAnime('', 1);
    </script>
</body>
</html>
